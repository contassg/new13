<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mateus Vendas</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0a74da;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
    gap:20px;
}

.produto{
    background:white;
    width:220px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
    padding:15px;
}

.produto img{
    width:100%;
    border-radius:8px;
}

.produto h3{
    margin:10px 0 5px;
}

.preco{
    color:green;
    font-weight:bold;
}

button{
    background:#0a74da;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#095ab0;
}
</style>

</head>

<body>

<header>
<h1>🛒 Mateus Vendas</h1>
<p>Os melhores produtos com ótimo preço</p>
</header>

<div class="container">

<div class="produto">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad" alt="Carregador de celular">
<h3>Carregador de Celular</h3>
<p class="preco">R$ 25,00</p>
<button>Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1582582494700-4a6c5b06d8e3" alt="Lençol de cama">
<h3>Lençol de Cama</h3>
<p class="preco">R$ 59,90</p>
<button>Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1606813909359-4c9b2b8d6e02" alt="Controle de TV">
<h3>Controle de TV</h3>
<p class="preco">R$ 35,00</p>
<button>Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1593642634524-b40b5baae6bb" alt="Mouse">
<h3>Mouse USB</h3>
<p class="preco">R$ 20,00</p>
<button>Comprar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1580894908361-967195033215" alt="Fone de ouvido">
<h3>Fone de Ouvido</h3>
<p class="preco">R$ 30,00</p>
<button>Comprar</button>
</div>

</div>

</body>
</html>
